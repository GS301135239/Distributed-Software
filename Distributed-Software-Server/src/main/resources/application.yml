server:
  port: ${PORT:8087}
  address: 0.0.0.0
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher
  datasource:
    url: jdbc:mysql://localhost:3306/distributed-software?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: zhong20050428
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379

# ???? MyBatis ?????????
mybatis:
  mapper-locations: classpath:Mappers/*.xml
  type-aliases-package: org.example.distributedsoftwareserver.Entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ??????
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

# ????
logging:
  level:
    org.example.distributedsoftwareserver: DEBUG
    org.mybatis: DEBUG
    org.apache.ibatis: DEBUG
    org.mybatis.spring: DEBUG
    org.mybatis.spring.mapper: DEBUG
    com.zaxxer.hikari: DEBUG
    org.springframework.jdbc: DEBUG
    # ??Spring AI????
    org.springframework.ai: DEBUG
    org.springframework.ai.openai: DEBUG
    org.springframework.ai.openai.api: DEBUG

